name: CI - Messenger Backend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  APP_ENV: development
  JWT__PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    MC4CAQAwBQYDK2VwBCIEIPWCeU76Q422lF1aq5mjqE/nP/o8zEhF6gXX6Mzk9n+g
    -----END PRIVATE KEY-----
  JWT__PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    MCowBQYDK2VwAyEA0IgiJOLeGDwumzkm+wi82nP7wvmbnaoWKmNNHMaq/Mw=
    -----END PUBLIC KEY-----
  JWT__ACCESS_TTL_SECONDS: 3600
  JWT__REFRESH_TTL_SECONDS: 604800
  SERVER__HOST: 0.0.0.0
  SERVER__PORT: 3000
  SERVER__CORS_ORIGINS: "*"
  SERVER__RATE_LIMIT_ENABLED: false
  DATABASE__URL: postgres://messenger:messenger_secret@127.0.0.1:5434/messenger_test
  DATABASE_URL: postgres://messenger:messenger_secret@127.0.0.1:5434/messenger_test
  REDIS__URL: redis://127.0.0.1:6379
  DATABASE__MAX_CONNECTIONS: 5
  DATABASE__MIN_CONNECTIONS: 1
  REDIS__MAX_CONNECTIONS: 5
  S3__ENDPOINT: http://127.0.0.1:9000
  S3__BUCKET: test-bucket
  S3__ACCESS_KEY_ID: minioadmin
  S3__SECRET_ACCESS_KEY: minioadmin123
  S3__REGION: us-east-1
  SMTP__HOST: 127.0.0.1
  SMTP__PORT: 1025
  SMTP__FROM: test@messenger.local
  SMS__PROVIDER: test
  SMS__API_KEY: test
  SMS__SENDER_ID: test

jobs:
  quality:
    name: Calidad de Código
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: messenger
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:password@127.0.0.1:5432/messenger
      DATABASE__URL: postgres://postgres:password@127.0.0.1:5432/messenger
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run Migrations
        run: sqlx migrate run --source ./migrations

      - name: Rustfmt Check
        run: cargo fmt --all -- --check
      
      - name: Clippy Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      
      - name: Security Audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --ignore RUSTSEC-2024-0363 --ignore RUSTSEC-2023-0071

  test:
    name: Tests Unitarios e Integración
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: messenger_test
          POSTGRES_USER: messenger
          POSTGRES_PASSWORD: messenger_secret
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run Migrations
        env:
          DATABASE_URL: postgres://messenger:messenger_secret@127.0.0.1:5434/messenger_test
        run: sqlx migrate run --source ./migrations

      - name: Run Tests
        env:
          DATABASE_URL: postgres://messenger:messenger_secret@127.0.0.1:5434/messenger_test
          DATABASE__URL: postgres://messenger:messenger_secret@127.0.0.1:5434/messenger_test
          REDIS__URL: redis://127.0.0.1:6379
        run: cargo test --workspace
